<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>

    <link rel="stylesheet" href="css/style.css">

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet">
</head>
<body>

<header>    
    <div class="container">
        <nav>
            <div class="logo" id="logo"></div>

            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#services">Services</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#testimonials">Reviews</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>

            <div class="menu-btn">☰</div>
        </nav>
    </div>
</header>

<section class="hero" id="home">
    <div class="container">
        <div class="hero-content reveal">

            <h1 id="hero-title"></h1>

            <p id="hero-description"></p>

            <div class="hero-buttons">
                <a href="#contact" class="btn btn-primary" id="hero-btn1"></a>
                <a href="#services" class="btn btn-outline" id="hero-btn2"></a>
            </div>

        </div>
    </div>
</section>

<section id="services">
    <div class="container">

        <div class="section-title reveal">
            <h2 id="services-title"></h2>
            <p id="services-subtitle"></p>
        </div>

        <div class="services-grid" id="services-container"></div>

    </div>
</section>

<section class="about" id="about">
    <div class="container">

        <div class="about-grid">

            <div class="reveal">
                <img id="about-image">
            </div>

            <div class="about-text reveal">

                <h2 id="about-title"></h2>

                <p id="about-p1"></p>

                <p id="about-p2"></p>

            </div>

        </div>

    </div>
</section>

<section class="stats">

    <div class="container">

        <div class="stats-grid" id="stats-container"></div>

    </div>

</section>

<section id="testimonials">

    <div class="container">

        <div class="section-title reveal">
            <h2>Client Testimonials</h2>
        </div>

        <div class="testimonials-grid" id="testimonials-container"></div>

    </div>

</section>

<section class="contact" id="contact">

    <div class="container">

        <div class="contact-grid">

            <div class="contact-info reveal">

                <h3 id="contact-title"></h3>

                <p id="contact-description"></p>

            </div>

            <form class="reveal">

                <input type="text" placeholder="Your Name" required>

                <input type="email" placeholder="Email Address" required>

                <input type="text" placeholder="Company">

                <textarea placeholder="Tell us about your project"></textarea>

                <button class="btn btn-primary">
                    Send Message
                </button>

            </form>

        </div>

    </div>

</section>

<footer>

    <div class="container">
        <p id="footer-text"></p>
    </div>

</footer>

<script src="js/app.js"></script>

</body>
</html>
